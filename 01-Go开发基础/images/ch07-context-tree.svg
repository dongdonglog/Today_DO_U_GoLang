<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Context 树结构</title>
  <desc id="desc">父 Context 取消会向所有子 Context 传播</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Context 树结构</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">父 Context 取消会向所有子 Context 传播</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="415" y="150" width="250" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="540" y="194" text-anchor="middle" font-size="21" font-weight="700" fill="#1d4ed8">Background</text>
    <rect x="220" y="295" width="230" height="70" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="335" y="339" text-anchor="middle" font-size="20" font-weight="700" fill="#155e75">request ctx</text>
    <rect x="630" y="295" width="230" height="70" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="745" y="339" text-anchor="middle" font-size="20" font-weight="700" fill="#15803d">job ctx</text>
    <rect x="130" y="440" width="210" height="70" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="235" y="484" text-anchor="middle" font-size="19" font-weight="700" fill="#b45309">db timeout</text>
    <rect x="425" y="440" width="210" height="70" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="530" y="484" text-anchor="middle" font-size="19" font-weight="700" fill="#be123c">rpc timeout</text>
    <rect x="720" y="440" width="210" height="70" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="825" y="484" text-anchor="middle" font-size="19" font-weight="700" fill="#6d28d9">worker ctx</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M500 220 L365 285"/><path d="M580 220 L715 285"/><path d="M310 365 L250 430"/><path d="M360 365 L500 430"/><path d="M760 365 L820 430"/></g>
</svg>
