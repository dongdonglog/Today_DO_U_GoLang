<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">云原生技术栈全景</title>
  <desc id="desc">展示云原生核心组件与 Go 的关系。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">云原生技术栈中的 Go</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">核心组件大量使用 Go：二进制部署简单，网络并发能力稳定</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="120" y="160" width="840" height="70" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="170" y="204" font-size="21" font-weight="700" fill="#1d4ed8">应用层</text>
    <text x="315" y="204" font-size="17" fill="#334155">Gin / gRPC 服务 · API Gateway · 微服务业务系统</text>

    <rect x="120" y="255" width="840" height="70" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="170" y="299" font-size="21" font-weight="700" fill="#155e75">服务治理</text>
    <text x="315" y="299" font-size="17" fill="#334155">gRPC · Istio 控制面 · Envoy 管理组件 · 服务发现</text>

    <rect x="120" y="350" width="840" height="70" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="170" y="394" font-size="21" font-weight="700" fill="#15803d">编排调度</text>
    <text x="315" y="394" font-size="17" fill="#334155">Kubernetes · Controller · Operator · Scheduler · API Server</text>

    <rect x="120" y="445" width="840" height="70" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="170" y="489" font-size="21" font-weight="700" fill="#b45309">可观测性</text>
    <text x="315" y="489" font-size="17" fill="#334155">Prometheus · pprof · trace · 日志采集 · 指标告警</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">
    <rect x="180" y="545" width="720" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="571" text-anchor="middle">Go 的静态编译、快速启动、低内存和高并发，正好匹配容器与微服务场景</text>
  </g>
</svg>
