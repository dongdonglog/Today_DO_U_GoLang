<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">依赖注入与 Mock</title>
  <desc id="desc">展示 UserService 依赖 UserStore 接口，生产环境注入 MySQLStore，测试环境注入 MockStore。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1040" height="560" fill="#f8fafc"/>
  <rect x="34" y="30" width="972" height="500" rx="18" fill="#ffffff" stroke="#dbe3ef"/>

  <text x="520" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">依赖注入与 Mock</text>
  <text x="520" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">业务逻辑依赖接口，运行时注入不同实现</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="90" y="215" width="220" height="118" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="200" y="262" text-anchor="middle" font-size="24" font-weight="700" fill="#155e75">UserService</text>
    <text x="200" y="292" text-anchor="middle" font-size="15" fill="#0e7490">只关心业务规则</text>

    <rect x="410" y="205" width="220" height="138" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="520" y="252" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">UserStore</text>
    <text x="520" y="282" text-anchor="middle" font-size="16" fill="#2563eb">interface</text>
    <text x="520" y="313" text-anchor="middle" font-size="14" fill="#475569">Save / Find / Delete</text>

    <rect x="730" y="150" width="220" height="112" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="840" y="196" text-anchor="middle" font-size="23" font-weight="700" fill="#15803d">MySQLStore</text>
    <text x="840" y="226" text-anchor="middle" font-size="15" fill="#166534">生产环境真实实现</text>

    <rect x="730" y="320" width="220" height="112" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="840" y="366" text-anchor="middle" font-size="23" font-weight="700" fill="#b45309">MockStore</text>
    <text x="840" y="396" text-anchor="middle" font-size="15" fill="#92400e">测试环境假实现</text>
  </g>

  <g fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)">
    <path d="M310 274 H397"/>
    <path d="M630 250 C675 230 685 205 718 205"/>
    <path d="M630 298 C675 318 685 376 718 376"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#475569">
    <text x="354" y="254" text-anchor="middle">依赖接口</text>
    <text x="676" y="194" text-anchor="middle">上线注入</text>
    <text x="676" y="354" text-anchor="middle">测试注入</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">
    <rect x="152" y="400" width="736" height="58" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="520" y="435" text-anchor="middle" fill="#334155">同一个 UserService，不需要知道背后是真数据库还是 Mock，只通过 UserStore 接口调用</text>
  </g>
</svg>
