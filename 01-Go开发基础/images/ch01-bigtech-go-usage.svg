<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">大厂使用 Go 全景</title>
  <desc id="desc">展示国际和国内大厂选择 Go 的典型场景，以及共同原因。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="640" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="580" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">大厂为什么选择 Go</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">高并发、云原生、基础设施和业务服务都需要稳定的工程效率</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="94" y="155" width="360" height="260" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="274" y="195" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">国际大厂</text>
    <text x="132" y="240" font-size="17" fill="#334155">Google：Go / Kubernetes</text>
    <text x="132" y="278" font-size="17" fill="#334155">Netflix：高并发缓存服务</text>
    <text x="132" y="316" font-size="17" fill="#334155">Uber：实时分析 AresDB</text>
    <text x="132" y="354" font-size="17" fill="#334155">Twitch：直播与聊天核心服务</text>
    <text x="132" y="392" font-size="17" fill="#334155">PayPal / Amex：支付系统现代化</text>

    <rect x="626" y="155" width="360" height="260" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="806" y="195" text-anchor="middle" font-size="24" font-weight="700" fill="#15803d">国内大厂</text>
    <text x="664" y="240" font-size="17" fill="#334155">字节跳动：微服务与 CloudWeGo</text>
    <text x="664" y="278" font-size="17" fill="#334155">腾讯：微信后台与云基础设施</text>
    <text x="664" y="316" font-size="17" fill="#334155">阿里：钉钉与容器服务</text>
    <text x="664" y="354" font-size="17" fill="#334155">美团：配送调度系统</text>
    <text x="664" y="392" font-size="17" fill="#334155">B 站：视频服务高并发请求</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M454 284 H512"/>
    <path d="M626 284 H568"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="360" y="450" width="360" height="95" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="540" y="485" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">共同选择理由</text>
    <text x="540" y="520" text-anchor="middle" font-size="16" fill="#475569">性能稳定 · 并发简单 · 单文件部署 · 编译快 · 云原生态完整</text>
  </g>
</svg>
