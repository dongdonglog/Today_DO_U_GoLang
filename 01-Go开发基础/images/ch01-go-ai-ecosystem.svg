<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Go AI 生态全景</title>
  <desc id="desc">展示 Go 在 AI 应用工程中的框架、推理、协议、Agent、RAG 和 Gateway 场景。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Go AI 应用生态</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">Python 训练模型，Go 更适合把 AI 产品稳定地跑起来</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="100" y="160" width="260" height="122" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="230" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">LLM 框架</text>
    <text x="230" y="235" text-anchor="middle" font-size="16" fill="#334155">Eino</text>
    <text x="230" y="260" text-anchor="middle" font-size="16" fill="#334155">LangChainGo</text>

    <rect x="410" y="160" width="260" height="122" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="540" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">本地推理</text>
    <text x="540" y="235" text-anchor="middle" font-size="16" fill="#334155">Ollama</text>
    <text x="540" y="260" text-anchor="middle" font-size="16" fill="#334155">模型服务封装</text>

    <rect x="720" y="160" width="260" height="122" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="850" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="#b45309">AI 协议</text>
    <text x="850" y="235" text-anchor="middle" font-size="16" fill="#334155">MCP Server</text>
    <text x="850" y="260" text-anchor="middle" font-size="16" fill="#334155">工具调用 / 鉴权 / 超时</text>

    <rect x="100" y="350" width="260" height="122" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="230" y="392" text-anchor="middle" font-size="22" font-weight="700" fill="#155e75">Agent 开发</text>
    <text x="230" y="425" text-anchor="middle" font-size="16" fill="#334155">Eino ADK</text>
    <text x="230" y="450" text-anchor="middle" font-size="16" fill="#334155">并发工具调用</text>

    <rect x="410" y="350" width="260" height="122" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="540" y="392" text-anchor="middle" font-size="22" font-weight="700" fill="#be123c">RAG 系统</text>
    <text x="540" y="425" text-anchor="middle" font-size="16" fill="#334155">向量检索</text>
    <text x="540" y="450" text-anchor="middle" font-size="16" fill="#334155">知识库 / 召回 / 重排</text>

    <rect x="720" y="350" width="260" height="122" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="850" y="392" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">AI Gateway</text>
    <text x="850" y="425" text-anchor="middle" font-size="16" fill="#334155">多模型路由</text>
    <text x="850" y="450" text-anchor="middle" font-size="16" fill="#334155">流式转发 / 限流 / 观测</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">
    <rect x="170" y="535" width="740" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="561" text-anchor="middle">AI 应用落地本质仍是服务端工程：连接、并发、超时、鉴权、日志和可观测性</text>
  </g>
</svg>
