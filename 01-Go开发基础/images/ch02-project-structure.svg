<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">标准 Go 项目结构</title>
  <desc id="desc">按职责组织目录，降低后续扩展成本</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">标准 Go 项目结构</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">按职责组织目录，降低后续扩展成本</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="150" y="155" width="780" height="410" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="210" y="205" font-size="22" font-weight="700" fill="#0f172a">user-service/</text>
    <text x="245" y="250" font-size="18" fill="#1d4ed8">cmd/</text><text x="385" y="250" font-size="16" fill="#334155">程序入口，例如 cmd/server/main.go</text>
    <text x="245" y="292" font-size="18" fill="#155e75">internal/</text><text x="385" y="292" font-size="16" fill="#334155">业务代码，只允许本项目内部引用</text>
    <text x="245" y="334" font-size="18" fill="#15803d">pkg/</text><text x="385" y="334" font-size="16" fill="#334155">可复用公共包，谨慎暴露 API</text>
    <text x="245" y="376" font-size="18" fill="#b45309">configs/</text><text x="385" y="376" font-size="16" fill="#334155">配置模板与环境配置</text>
    <text x="245" y="418" font-size="18" fill="#be123c">tests/</text><text x="385" y="418" font-size="16" fill="#334155">集成测试、端到端测试</text>
    <text x="245" y="460" font-size="18" fill="#6d28d9">docs/</text><text x="385" y="460" font-size="16" fill="#334155">接口文档、架构说明和运维手册</text>
    <rect x="240" y="505" width="600" height="34" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="540" y="528" text-anchor="middle" font-size="15" fill="#334155">原则：入口薄、业务沉到 internal、公共包少而稳定</text>
  </g>
</svg>
