<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD 流水线</title>
  <desc id="desc">从代码提交到生产部署的自动化路径</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">CI/CD 流水线</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">从代码提交到生产部署的自动化路径</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="90" y="235" width="145" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="162" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">提交代码</text>
    <text x="162.5" y="307" text-anchor="middle" font-size="15" fill="#334155">Git push</text>
    <text x="162.5" y="331" text-anchor="middle" font-size="15" fill="#334155">触发流水线</text>
    <rect x="260" y="235" width="145" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="332" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">质量检查</text>
    <text x="332.5" y="307" text-anchor="middle" font-size="15" fill="#334155">fmt / vet</text>
    <text x="332.5" y="331" text-anchor="middle" font-size="15" fill="#334155">unit test</text>
    <rect x="430" y="235" width="145" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="502" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">构建产物</text>
    <text x="502.5" y="307" text-anchor="middle" font-size="15" fill="#334155">go build</text>
    <text x="502.5" y="331" text-anchor="middle" font-size="15" fill="#334155">生成二进制</text>
    <rect x="600" y="235" width="145" height="90" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="672" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">镜像打包</text>
    <text x="672.5" y="307" text-anchor="middle" font-size="15" fill="#334155">Docker build</text>
    <text x="672.5" y="331" text-anchor="middle" font-size="15" fill="#334155">推送仓库</text>
    <rect x="770" y="235" width="145" height="90" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="842" y="273" text-anchor="middle" font-size="18" font-weight="700" fill="#be123c">部署发布</text>
    <text x="842.5" y="307" text-anchor="middle" font-size="15" fill="#334155">灰度 / 回滚</text>
    <text x="842.5" y="331" text-anchor="middle" font-size="15" fill="#334155">监控验证</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M235 280 H250"/>
    <path d="M405 280 H420"/>
    <path d="M575 280 H590"/>
    <path d="M745 280 H760"/>
  </g>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">
    <rect x="170" y="545" width="740" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="571" text-anchor="middle">流水线的目标不是复杂，而是让每次变更都可重复、可追踪、可回滚</text>
  </g>
</svg>
