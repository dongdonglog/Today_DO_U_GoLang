<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">Go 工程师成长路线图</title>
  <desc id="desc">展示 Go 工程师从初级、中级、高级到 AI 基础设施方向的成长路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="660" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="600" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Go 工程师成长路线图</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">从业务 API 到微服务、云原生，再到 AI 应用基础设施</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="85" y="200" width="210" height="245" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="190" y="242" text-anchor="middle" font-size="24" font-weight="700" fill="#155e75">初级</text>
    <text x="190" y="272" text-anchor="middle" font-size="15" fill="#0e7490">15-25K</text>
    <text x="120" y="315" font-size="15" fill="#334155">Go 基础语法</text>
    <text x="120" y="348" font-size="15" fill="#334155">Gin / HTTP API</text>
    <text x="120" y="381" font-size="15" fill="#334155">MySQL / Redis</text>
    <text x="120" y="414" font-size="15" fill="#334155">REST 服务开发</text>

    <rect x="325" y="200" width="210" height="245" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="430" y="242" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">中级</text>
    <text x="430" y="272" text-anchor="middle" font-size="15" fill="#2563eb">25-40K</text>
    <text x="360" y="315" font-size="15" fill="#334155">微服务开发</text>
    <text x="360" y="348" font-size="15" fill="#334155">gRPC / Kafka</text>
    <text x="360" y="381" font-size="15" fill="#334155">Docker 容器化</text>
    <text x="360" y="414" font-size="15" fill="#334155">高并发系统经验</text>

    <rect x="565" y="200" width="210" height="245" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="670" y="242" text-anchor="middle" font-size="24" font-weight="700" fill="#15803d">高级</text>
    <text x="670" y="272" text-anchor="middle" font-size="15" fill="#16a34a">40-60K</text>
    <text x="600" y="315" font-size="15" fill="#334155">Kubernetes</text>
    <text x="600" y="348" font-size="15" fill="#334155">性能优化</text>
    <text x="600" y="381" font-size="15" fill="#334155">云原生生态</text>
    <text x="600" y="414" font-size="15" fill="#334155">系统架构设计</text>

    <rect x="805" y="200" width="210" height="245" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="910" y="242" text-anchor="middle" font-size="24" font-weight="700" fill="#6d28d9">稀缺方向</text>
    <text x="910" y="272" text-anchor="middle" font-size="15" fill="#7c3aed">50-80K+</text>
    <text x="840" y="315" font-size="15" fill="#334155">Go + AI 应用</text>
    <text x="840" y="348" font-size="15" fill="#334155">LLM / Agent / RAG</text>
    <text x="840" y="381" font-size="15" fill="#334155">MCP Server</text>
    <text x="840" y="414" font-size="15" fill="#334155">AI Gateway</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M295 322 H313"/>
    <path d="M535 322 H553"/>
    <path d="M775 322 H793"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">
    <rect x="170" y="515" width="740" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="541" text-anchor="middle">核心路径：业务能力打底，工程能力进阶，云原生和 AI 基础设施形成差异化</text>
  </g>
</svg>
