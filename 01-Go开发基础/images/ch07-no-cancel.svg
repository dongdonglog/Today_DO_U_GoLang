<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">没有取消机制的请求处理</title>
  <desc id="desc">客户端已超时，但后端任务还在继续消耗资源</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">没有取消机制的请求处理</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">客户端已超时，但后端任务还在继续消耗资源</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="95" y="245" width="190" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="190" y="282" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">Client</text><text x="190" y="310" text-anchor="middle" font-size="14" fill="#334155">请求超时离开</text>
    <rect x="445" y="245" width="190" height="90" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="540" y="282" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">Server</text><text x="540" y="310" text-anchor="middle" font-size="14" fill="#334155">不知道已取消</text>
    <rect x="795" y="245" width="190" height="90" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="890" y="282" text-anchor="middle" font-size="20" font-weight="700" fill="#be123c">DB / RPC</text><text x="890" y="310" text-anchor="middle" font-size="14" fill="#334155">继续执行</text>
    <rect x="330" y="420" width="420" height="56" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="540" y="455" text-anchor="middle" font-size="16" fill="#334155">结果：资源浪费、队列堆积、慢请求放大</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M285 290 H433"/><path d="M635 290 H783"/></g>
  <path d="M190 335 C235 390 280 410 335 430" fill="none" stroke="#e11d48" stroke-width="3" stroke-dasharray="8 8"/>
</svg>
