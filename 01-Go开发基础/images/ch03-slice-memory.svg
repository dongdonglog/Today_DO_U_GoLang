<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Slice 内存布局</title>
  <desc id="desc">Slice 是一个描述底层数组窗口的三字段结构</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Slice 内存布局</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">Slice 是一个描述底层数组窗口的三字段结构</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="120" y="175" width="300" height="210" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="270" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">slice header</text>
    <text x="180" y="270" font-size="18" fill="#334155">ptr</text><text x="300" y="270" font-size="18" fill="#334155">指向数组</text>
    <text x="180" y="315" font-size="18" fill="#334155">len</text><text x="300" y="315" font-size="18" fill="#334155">当前长度</text>
    <text x="180" y="360" font-size="18" fill="#334155">cap</text><text x="300" y="360" font-size="18" fill="#334155">可用容量</text>
    <rect x="610" y="230" width="70" height="70" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><rect x="680" y="230" width="70" height="70" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><rect x="750" y="230" width="70" height="70" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><rect x="820" y="230" width="70" height="70" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="205" text-anchor="middle" font-size="22" font-weight="700" fill="#155e75">底层数组</text>
    <text x="645" y="272" text-anchor="middle" font-size="18" fill="#334155">A</text><text x="715" y="272" text-anchor="middle" font-size="18" fill="#334155">B</text><text x="785" y="272" text-anchor="middle" font-size="18" fill="#334155">C</text><text x="855" y="272" text-anchor="middle" font-size="18" fill="#94a3b8">空</text>
  </g>
  <path d="M420 270 C500 250 540 250 598 260" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="540" y="500" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">切片扩容可能分配新数组，因此 append 后要使用返回的新 slice</text>
</svg>
