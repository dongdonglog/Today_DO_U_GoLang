<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">中间件链式调用</title>
  <desc id="desc">请求按顺序进入中间件，响应按相反方向返回</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">中间件链式调用</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">请求按顺序进入中间件，响应按相反方向返回</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="100" y="245" width="150" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="175" y="282" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">Logging</text><text x="175" y="310" text-anchor="middle" font-size="14" fill="#334155">记录请求</text>
    <rect x="310" y="245" width="150" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="385" y="282" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">Auth</text><text x="385" y="310" text-anchor="middle" font-size="14" fill="#334155">鉴权</text>
    <rect x="520" y="245" width="150" height="90" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="595" y="282" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">Recover</text><text x="595" y="310" text-anchor="middle" font-size="14" fill="#334155">兜底恢复</text>
    <rect x="730" y="245" width="150" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="805" y="282" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">Handler</text><text x="805" y="310" text-anchor="middle" font-size="14" fill="#334155">业务逻辑</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M250 275 H298"/><path d="M460 275 H508"/><path d="M670 275 H718"/><path d="M730 335 C590 410 380 410 185 345"/></g>
  <text x="540" y="475" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">洋葱模型：进入时从外到内，返回时从内到外</text>
</svg>
