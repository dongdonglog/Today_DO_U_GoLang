<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Context Value 查找链</title>
  <desc id="desc">Value 会沿父链向上查找，适合传递请求范围元数据</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Context Value 查找链</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">Value 会沿父链向上查找，适合传递请求范围元数据</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="110" y="255" width="180" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="200" y="292" text-anchor="middle" font-size="19" font-weight="700" fill="#1d4ed8">ctx3</text><text x="200" y="320" text-anchor="middle" font-size="14" fill="#334155">userID</text>
    <rect x="360" y="255" width="180" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="450" y="292" text-anchor="middle" font-size="19" font-weight="700" fill="#155e75">ctx2</text><text x="450" y="320" text-anchor="middle" font-size="14" fill="#334155">traceID</text>
    <rect x="610" y="255" width="180" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="700" y="292" text-anchor="middle" font-size="19" font-weight="700" fill="#15803d">ctx1</text><text x="700" y="320" text-anchor="middle" font-size="14" fill="#334155">requestID</text>
    <rect x="860" y="255" width="120" height="90" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/><text x="920" y="304" text-anchor="middle" font-size="18" font-weight="700" fill="#475569">root</text>
    <rect x="310" y="445" width="460" height="54" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="540" y="479" text-anchor="middle" font-size="16" fill="#334155">查找 key 时：当前节点没有，就继续向父 Context 查找</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M290 300 H348"/><path d="M540 300 H598"/><path d="M790 300 H848"/></g>
</svg>
