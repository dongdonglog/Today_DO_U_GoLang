<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">errgroup 并发取消</title>
  <desc id="desc">任一任务返回错误时，取消同组其他任务</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">errgroup 并发取消</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">任一任务返回错误时，取消同组其他任务</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="390" y="150" width="300" height="78" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="540" y="198" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">errgroup.WithContext</text>
    <rect x="120" y="330" width="220" height="88" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="230" y="365" text-anchor="middle" font-size="20" font-weight="700" fill="#155e75">goroutine A</text><text x="230" y="393" text-anchor="middle" font-size="14" fill="#334155">正常返回</text>
    <rect x="430" y="330" width="220" height="88" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="540" y="365" text-anchor="middle" font-size="20" font-weight="700" fill="#be123c">goroutine B</text><text x="540" y="393" text-anchor="middle" font-size="14" fill="#334155">返回 error</text>
    <rect x="740" y="330" width="220" height="88" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="850" y="365" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">goroutine C</text><text x="850" y="393" text-anchor="middle" font-size="14" fill="#334155">收到取消</text>
    <rect x="360" y="505" width="360" height="54" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/><text x="540" y="539" text-anchor="middle" font-size="16" fill="#334155">g.Wait() 返回第一个错误</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M455 228 L250 318"/><path d="M540 228 V318"/><path d="M625 228 L830 318"/><path d="M540 418 V493"/><path d="M650 374 H728"/></g>
</svg>
