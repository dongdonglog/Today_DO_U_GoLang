<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">测试问题排查流程</title>
  <desc id="desc">展示测试失败时按共享状态、执行顺序、外部依赖、时间随机并发和断言强度逐步排查。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1080" height="620" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="560" rx="18" fill="#ffffff" stroke="#dbe3ef"/>

  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">测试问题排查流程</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">测试失败或偶发失败时，优先排查这些高频原因</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="380" y="150" width="320" height="66" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="540" y="190" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">测试失败 / 偶发失败</text>

    <rect x="90" y="278" width="250" height="82" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="215" y="310" text-anchor="middle" font-size="19" font-weight="700" fill="#155e75">是否共享状态？</text>
    <text x="215" y="338" text-anchor="middle" font-size="14" fill="#0e7490">全局变量、共享 store、缓存</text>

    <rect x="415" y="278" width="250" height="82" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="540" y="310" text-anchor="middle" font-size="19" font-weight="700" fill="#15803d">是否依赖顺序？</text>
    <text x="540" y="338" text-anchor="middle" font-size="14" fill="#166534">TestB 依赖 TestA 的结果</text>

    <rect x="740" y="278" width="250" height="82" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="865" y="310" text-anchor="middle" font-size="19" font-weight="700" fill="#b45309">是否访问真实 IO？</text>
    <text x="865" y="338" text-anchor="middle" font-size="14" fill="#92400e">数据库、网络、文件路径</text>

    <rect x="250" y="430" width="250" height="82" rx="12" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="375" y="462" text-anchor="middle" font-size="19" font-weight="700" fill="#be123c">是否依赖不确定性？</text>
    <text x="375" y="490" text-anchor="middle" font-size="14" fill="#9f1239">时间、随机数、并发调度</text>

    <rect x="580" y="430" width="250" height="82" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="705" y="462" text-anchor="middle" font-size="19" font-weight="700" fill="#6d28d9">断言是否太弱？</text>
    <text x="705" y="490" text-anchor="middle" font-size="14" fill="#5b21b6">只测 err != nil，没测类型和结果</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M500 216 C410 246 310 248 230 270"/>
    <path d="M540 216 V266"/>
    <path d="M580 216 C670 246 770 248 850 270"/>
    <path d="M405 360 C390 382 382 400 378 418"/>
    <path d="M675 360 C690 382 698 400 702 418"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#334155">
    <rect x="160" y="535" width="760" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="557" text-anchor="middle">原则：每个测试独立、依赖可替换、时间可控制、断言要验证具体行为</text>
  </g>
</svg>
