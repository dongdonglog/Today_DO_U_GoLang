<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">Goroutine GMP 调度模型</title>
  <desc id="desc">展示 Goroutine、Processor、Machine 在线程调度中的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="640" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="580" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Goroutine GMP 调度模型</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">大量 Goroutine 通过 P 调度到少量 OS Thread 上运行</text>

  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="90" y="165" width="900" height="92" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="140" y="202" font-size="22" font-weight="700" fill="#155e75">G：Goroutine</text>
    <text x="140" y="231" font-size="15" fill="#334155">轻量级任务，初始栈小，适合创建大量并发任务</text>
    <g fill="#ffffff" stroke="#0891b2" stroke-width="2">
      <rect x="520" y="188" width="58" height="38" rx="8"/>
      <rect x="595" y="188" width="58" height="38" rx="8"/>
      <rect x="670" y="188" width="58" height="38" rx="8"/>
      <rect x="745" y="188" width="58" height="38" rx="8"/>
      <rect x="820" y="188" width="58" height="38" rx="8"/>
    </g>
    <g font-size="15" font-weight="700" fill="#155e75" text-anchor="middle">
      <text x="549" y="212">G</text>
      <text x="624" y="212">G</text>
      <text x="699" y="212">G</text>
      <text x="774" y="212">G</text>
      <text x="849" y="212">G</text>
    </g>

    <rect x="150" y="325" width="330" height="95" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="315" y="363" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">P：Processor</text>
    <text x="315" y="394" text-anchor="middle" font-size="15" fill="#334155">本地运行队列，负责调度 G</text>

    <rect x="600" y="325" width="330" height="95" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="765" y="363" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">M：OS Thread</text>
    <text x="765" y="394" text-anchor="middle" font-size="15" fill="#334155">操作系统线程，真正执行代码</text>

    <rect x="315" y="485" width="450" height="60" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="540" y="522" text-anchor="middle" font-size="17" fill="#334155">运行时调度器：把海量 G 映射到有限 M，提高并发效率</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M500 257 C430 285 370 295 335 317"/>
    <path d="M580 257 C650 285 710 295 745 317"/>
    <path d="M480 372 H588"/>
    <path d="M540 420 V474"/>
  </g>
</svg>
