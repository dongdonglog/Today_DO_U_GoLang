<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Go 零值规则</title>
  <desc id="desc">Go 鼓励类型的零值可用，减少初始化样板代码</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Go 零值规则</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">Go 鼓励类型的零值可用，减少初始化样板代码</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="100" y="160" width="260" height="122" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="230" y="198" text-anchor="middle" font-size="21" font-weight="700" fill="#1d4ed8">数值</text>
    <text x="230.0" y="232" text-anchor="middle" font-size="15" fill="#334155">0</text>
    <rect x="410" y="160" width="260" height="122" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="540" y="198" text-anchor="middle" font-size="21" font-weight="700" fill="#155e75">字符串</text>
    <text x="540.0" y="232" text-anchor="middle" font-size="15" fill="#334155">空字符串</text>
    <rect x="720" y="160" width="260" height="122" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="850" y="198" text-anchor="middle" font-size="21" font-weight="700" fill="#15803d">布尔</text>
    <text x="850.0" y="232" text-anchor="middle" font-size="15" fill="#334155">false</text>
    <rect x="100" y="340" width="260" height="122" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="230" y="378" text-anchor="middle" font-size="21" font-weight="700" fill="#b45309">指针 / 切片</text>
    <text x="230.0" y="412" text-anchor="middle" font-size="15" fill="#334155">nil</text>
    <rect x="410" y="340" width="260" height="122" rx="14" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="540" y="378" text-anchor="middle" font-size="21" font-weight="700" fill="#be123c">结构体</text>
    <text x="540.0" y="412" text-anchor="middle" font-size="15" fill="#334155">字段各自零值</text>
    <rect x="720" y="340" width="260" height="122" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="850" y="378" text-anchor="middle" font-size="21" font-weight="700" fill="#6d28d9">sync.Mutex</text>
    <text x="850.0" y="412" text-anchor="middle" font-size="15" fill="#334155">零值可直接使用</text>
  </g>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">
    <rect x="170" y="535" width="740" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="540" y="561" text-anchor="middle">设计结构体时，尽量让零值处于可预测、可使用的状态</text>
  </g>
</svg>
