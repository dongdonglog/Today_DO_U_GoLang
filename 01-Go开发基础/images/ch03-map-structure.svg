<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Map 底层结构</title>
  <desc id="desc">哈希表通过桶存储键值，冲突时使用溢出桶</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="650" fill="#f8fafc"/>
  <rect x="34" y="30" width="1012" height="590" rx="18" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="540" y="78" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#0f172a">Map 底层结构</text>
  <text x="540" y="112" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">哈希表通过桶存储键值，冲突时使用溢出桶</text>
  <g filter="url(#shadow)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="100" y="220" width="220" height="120" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="210" y="268" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">hmap</text>
    <text x="210" y="302" text-anchor="middle" font-size="15" fill="#334155">count / B / buckets</text>
    <rect x="450" y="165" width="170" height="85" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="535" y="198" text-anchor="middle" font-size="19" font-weight="700" fill="#155e75">bucket 0</text><text x="535" y="226" text-anchor="middle" font-size="14" fill="#334155">key/value slots</text>
    <rect x="450" y="275" width="170" height="85" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="535" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#15803d">bucket 1</text><text x="535" y="336" text-anchor="middle" font-size="14" fill="#334155">key/value slots</text>
    <rect x="450" y="385" width="170" height="85" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="535" y="418" text-anchor="middle" font-size="19" font-weight="700" fill="#b45309">bucket 2</text><text x="535" y="446" text-anchor="middle" font-size="14" fill="#334155">key/value slots</text>
    <rect x="750" y="275" width="170" height="85" rx="12" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="835" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#be123c">overflow</text><text x="835" y="336" text-anchor="middle" font-size="14" fill="#334155">冲突后的溢出桶</text>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><path d="M320 280 H438"/><path d="M620 318 H738"/></g>
  <text x="540" y="540" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">map 不是并发安全结构，多 goroutine 写入需要锁或 sync.Map</text>
</svg>
